name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability check
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Verify the app builds and starts
        env:
          PORT: 4000
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_CONNECTION_STRING: localhost:1521/CI
          JWT_SECRET: ci-only-secret-never-used-for-anything-real
        run: |
          node app.js &
          APP_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:4000/api/health > /dev/null; then
              echo "App started and responded successfully"
              kill $APP_PID
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond within 15 seconds"
          kill $APP_PID 2>/dev/null || true
          exit 1

      - name: Test
        run: npm test
